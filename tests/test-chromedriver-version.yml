name: Test chromedriver-version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          chromedriver-version: "114.0.5735.90"
      - name: Assert chromedriver is installed
        run: |
          which chromedriver || (echo "FAIL: chromedriver not found in PATH" && exit 1)
          chromedriver --version
          echo "PASS: chromedriver is installed"
